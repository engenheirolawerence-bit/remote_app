name: Build NEXUS APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Date
        id: get-date
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      # Instalação de dependências robusta para Ubuntu 22.04/24.04
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3-dev ffmpeg \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
          zlib1g-dev libgstreamer1.0-gstreamer-lite-1.0-0 xclip xsel libjpeg-dev

      # Ação oficial corrigida: kivy/buildozer-action@master
      - name: Build with Buildozer
        uses: kivy/buildozer-action@master
        with:
          save_buildozer_cache: true
          buildozer_version: master
          command: buildozer android debug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NEXUS-Remote-v21-${{ steps.get-date.outputs.date }}
          path: bin/*.apk
